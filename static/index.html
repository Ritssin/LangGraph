<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LangGraph Router</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #0f1115;
        --panel: #171a21;
        --border: #2a3040;
        --text: #e8eaed;
        --muted: #9aa3b2;
        --accent: #6c8cff;
        --accent-dim: #4d62b8;
        --agent-calc: #3dd6c3;
        --agent-news: #ffb84d;
        --agent-other: #c792ea;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: "DM Sans", system-ui, sans-serif;
        background: var(--bg);
        color: var(--text);
      }
      header {
        padding: 1rem 1.5rem;
        border-bottom: 1px solid var(--border);
        background: linear-gradient(180deg, #141820 0%, var(--bg) 100%);
      }
      header h1 {
        margin: 0;
        font-size: 1.15rem;
        font-weight: 700;
        letter-spacing: -0.02em;
      }
      header p {
        margin: 0.35rem 0 0;
        font-size: 0.85rem;
        color: var(--muted);
        max-width: 42rem;
        line-height: 1.45;
      }
      .layout {
        display: grid;
        grid-template-columns: 1fr 1fr;
        min-height: calc(100vh - 5.5rem);
      }
      @media (max-width: 840px) {
        .layout {
          grid-template-columns: 1fr;
          min-height: auto;
        }
      }
      .pane {
        display: flex;
        flex-direction: column;
        padding: 1.25rem 1.5rem;
        gap: 0.75rem;
        border-right: 1px solid var(--border);
      }
      @media (max-width: 840px) {
        .pane {
          border-right: none;
          border-bottom: 1px solid var(--border);
        }
      }
      .pane:last-child {
        border-right: none;
        border-bottom: none;
      }
      .pane-label {
        font-size: 0.7rem;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: var(--muted);
        font-weight: 600;
      }
      textarea {
        flex: 1;
        min-height: 220px;
        resize: vertical;
        padding: 1rem;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: var(--panel);
        color: var(--text);
        font-family: "JetBrains Mono", ui-monospace, monospace;
        font-size: 0.9rem;
        line-height: 1.5;
      }
      textarea:focus {
        outline: 2px solid var(--accent-dim);
        outline-offset: 2px;
      }
      .actions {
        display: flex;
        gap: 0.65rem;
        flex-wrap: wrap;
        align-items: center;
      }
      button {
        font-family: inherit;
        font-weight: 600;
        font-size: 0.9rem;
        padding: 0.65rem 1.25rem;
        border-radius: 8px;
        border: none;
        cursor: pointer;
        background: var(--accent);
        color: #0a0c10;
      }
      button:hover:not(:disabled) {
        filter: brightness(1.08);
      }
      button:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }
      .hint {
        font-size: 0.8rem;
        color: var(--muted);
      }
      .output-wrap {
        flex: 1;
        min-height: 220px;
        padding: 1rem;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: var(--panel);
        overflow: auto;
      }
      .route-pill {
        display: inline-block;
        font-size: 0.72rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        padding: 0.25rem 0.6rem;
        border-radius: 999px;
        margin-bottom: 0.75rem;
      }
      .route-pill.calculation {
        background: rgba(61, 214, 195, 0.15);
        color: var(--agent-calc);
      }
      .route-pill.news {
        background: rgba(255, 184, 77, 0.15);
        color: var(--agent-news);
      }
      .route-pill.other {
        background: rgba(199, 146, 234, 0.15);
        color: var(--agent-other);
      }
      .output-body {
        font-size: 0.95rem;
        line-height: 1.6;
        white-space: pre-wrap;
        word-break: break-word;
      }
      .output-body.placeholder {
        color: var(--muted);
        font-style: italic;
      }
      .err {
        color: #ff8a8a;
        font-size: 0.9rem;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>LangGraph + LangChain router</h1>
      <p>
        Prompts are classified by an LLM: <strong>calculation</strong> → math agent,
        <strong>news</strong> → search + summary, <strong>other</strong> → joke response.
      </p>
    </header>
    <div class="layout">
      <section class="pane" aria-label="Input">
        <span class="pane-label">Input</span>
        <textarea
          id="prompt"
          placeholder="Try: What is 384 × 27?&#10;Or: What are today's top science headlines?&#10;Or: Explain quantum tunneling."
        ></textarea>
        <div class="actions">
          <button type="button" id="send">Run router</button>
          <span class="hint">Requires <code>OPENAI_API_KEY</code> in <code>.env</code></span>
        </div>
      </section>
      <section class="pane" aria-label="Output">
        <span class="pane-label">Output</span>
        <div class="output-wrap">
          <div id="route" class="route-pill" hidden></div>
          <div id="out" class="output-body placeholder">Response appears here.</div>
        </div>
      </section>
    </div>
    <script>
      const promptEl = document.getElementById("prompt");
      const outEl = document.getElementById("out");
      const routeEl = document.getElementById("route");
      const sendBtn = document.getElementById("send");

      function routeClass(route) {
        if (route === "calculation") return "calculation";
        if (route === "news") return "news";
        return "other";
      }

      function routeLabel(route) {
        if (route === "calculation") return "Routed: calculation → agent 1";
        if (route === "news") return "Routed: news → agent 2";
        return "Routed: other → agent 3 (joke)";
      }

      sendBtn.addEventListener("click", async () => {
        const prompt = promptEl.value.trim();
        if (!prompt) {
          outEl.textContent = "Enter a prompt first.";
          outEl.classList.remove("placeholder");
          routeEl.hidden = true;
          return;
        }
        sendBtn.disabled = true;
        outEl.classList.add("placeholder");
        outEl.textContent = "Thinking…";
        routeEl.hidden = true;

        try {
          const res = await fetch("/api/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ prompt }),
          });
          const data = await res.json().catch(() => ({}));
          if (!res.ok) {
            const d = data.detail;
            const msg =
              typeof d === "string"
                ? d
                : Array.isArray(d)
                  ? d.map((x) => x.msg || JSON.stringify(x)).join("; ")
                  : res.statusText || "Request failed";
            throw new Error(msg);
          }
          routeEl.hidden = false;
          routeEl.className = "route-pill " + routeClass(data.route);
          routeEl.textContent = routeLabel(data.route);
          outEl.textContent = data.response || "(empty response)";
          outEl.classList.remove("placeholder");
        } catch (e) {
          outEl.innerHTML =
            '<span class="err">' + (e.message || String(e)) + "</span>";
          outEl.classList.remove("placeholder");
          routeEl.hidden = true;
        } finally {
          sendBtn.disabled = false;
        }
      });
    </script>
  </body>
</html>
